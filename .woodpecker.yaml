steps:
  build-main:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      registry: codeberg.org
      repo: codeberg.org/fatturino/fatturino
      tags:
        - latest
        - "sha-${CI_COMMIT_SHA:0:8}"
      username:
        from_secret: codeberg_user
      password:
        from_secret: codeberg_token
      platforms:
        - linux/amd64
        - linux/arm64
      # List syntax avoids comma-splitting by the plugin; each item passed verbatim to --cache-from
      cache_from:
        - "type=registry,ref=codeberg.org/fatturino/fatturino:buildcache"
      cache_to: "type=registry,ref=codeberg.org/fatturino/fatturino:buildcache,mode=max"
      build_args:
        - APP_VERSION=${CI_COMMIT_SHA}
    when:
      branch: main
      event: [push, manual]

  build-release:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      registry: codeberg.org
      repo: codeberg.org/fatturino/fatturino
      # CI_COMMIT_TAG is "v0.0.1"; we also publish without the "v" prefix
      # so image tag aligns with SemVer (e.g., codeberg.org/fatturino/fatturino:0.0.1).
      tags:
        - "${CI_COMMIT_TAG}"
        - "${CI_COMMIT_TAG##v}"
        - latest-stable
      username:
        from_secret: codeberg_user
      password:
        from_secret: codeberg_token
      platforms:
        - linux/amd64
        - linux/arm64
      cache_from:
        - "type=registry,ref=codeberg.org/fatturino/fatturino:buildcache"
      cache_to: "type=registry,ref=codeberg.org/fatturino/fatturino:buildcache,mode=max"
      build_args:
        - APP_VERSION=${CI_COMMIT_TAG}
    when:
      event: tag
      ref: refs/tags/v*

  notify_telegram:
    image: appleboy/drone-telegram
    settings:
      token:
        from_secret: telegram_token
      to:
        from_secret: telegram_chat_id
      message: |
        Build {{#success build.status}}✅ SUCCESS{{else}}❌ FAILED{{/success}}

        Repo: {{repo.name}}
        Branch: {{commit.branch}}
        Build: #{{build.number}}
        Autore: {{commit.author}}
        Commit: {{commit.sha}}
        Link: {{build.link}}
    when:
      - event: [push, tag, manual]
        status: [success, failure]

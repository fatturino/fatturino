steps:
  # ============================================================================
  # PHP BASE IMAGE
  # Pre-compila estensioni PHP pesanti (intl, bcmath, gd) per entrambe le
  # architetture. L'immagine viene pushata nel registry e usata come base
  # da build-main e build-release.
  #
  # Si attiva automaticamente quando docker/php-base.Dockerfile cambia,
  # oppure manualmente dalla UI di Woodpecker.
  # ============================================================================
  build-php-base:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      registry: codeberg.org
      repo: codeberg.org/fatturino/fatturino
      dockerfile: docker/php-base.Dockerfile
      tags:
        - php-base
      username:
        from_secret: codeberg_user
      password:
        from_secret: codeberg_token
      platforms:
        - linux/amd64
        - linux/arm64
    when:
      - event: manual
      - event: push
        path:
          - docker/php-base.Dockerfile

  # ============================================================================
  # BUILD MAIN (push su main)
  # Build multi-arch (AMD64 + ARM64) ad ogni push sul branch main.
  # Usa php-base pre-buildato dal registry, quindi la compilazione di intl
  # non viene ripetuta. Il cache registry evita di rifare gli step invariati.
  # ============================================================================
  build-main:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      registry: codeberg.org
      repo: codeberg.org/fatturino/fatturino
      tags:
        - latest
        - "sha-${CI_COMMIT_SHA:0:8}"
      username:
        from_secret: codeberg_user
      password:
        from_secret: codeberg_token
      platforms:
        - linux/amd64
        - linux/arm64
      cache_from: codeberg.org/fatturino/fatturino:buildcache
      cache_to: "type=registry,ref=codeberg.org/fatturino/fatturino:buildcache,mode=max"
      build_args:
        - APP_VERSION=${CI_COMMIT_SHA}
    when:
      branch: main
      event: [push, manual]

  # ============================================================================
  # BUILD RELEASE (tag v*)
  # Build multi-arch ad ogni tag versionato. Pubblica tag SemVer con e senza
  # prefisso "v" (es. v1.2.3 -> :1.2.3 e :v1.2.3), più :latest-stable.
  # ============================================================================
  build-release:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      registry: codeberg.org
      repo: codeberg.org/fatturino/fatturino
      tags:
        - "${CI_COMMIT_TAG}"
        - "${CI_COMMIT_TAG##v}"
        - latest-stable
      username:
        from_secret: codeberg_user
      password:
        from_secret: codeberg_token
      platforms:
        - linux/amd64
        - linux/arm64
      cache_from: codeberg.org/fatturino/fatturino:buildcache
      cache_to: "type=registry,ref=codeberg.org/fatturino/fatturino:buildcache,mode=max"
      build_args:
        - APP_VERSION=${CI_COMMIT_TAG}
    when:
      event: tag
      ref: refs/tags/v*

  # ============================================================================
  # NOTIFY TELEGRAM
  # ============================================================================
  notify_telegram:
    image: appleboy/drone-telegram
    settings:
      token:
        from_secret: telegram_token
      to:
        from_secret: telegram_chat_id
      message: |
        Build {{#success build.status}}✅ SUCCESS{{else}}❌ FAILED{{/success}}

        Repo: {{repo.name}}
        Branch: {{commit.branch}}
        Build: #{{build.number}}
        Autore: {{commit.author}}
        Commit: {{commit.sha}}
        Link: {{build.link}}
    when:
      - event: [push, tag, manual]
        status: [success, failure]

query SalesInvoicesList($page: Int!, $first: Int!) {
  salesInvoices(page: $page, first: $first) {
    data {
      id
      number
      date
      status
      payment_status
      total_gross
      total_paid
      net_due
      is_sdi_editable
      contact { id name }
    }
    paginatorInfo {
      currentPage
      lastPage
      total
      firstItem
      lastItem
      hasMorePages
    }
  }
}
